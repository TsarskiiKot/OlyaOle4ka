<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olha Kononchuk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@300;400&family=Cormorant:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── INTRO ─────────────────────────────────────── -->
  <div id="intro" class="intro">
    <div class="intro-inner">
      <img class="intro-logo" src="Лого/монограма3.png" alt="Olha Kononchuk">
    </div>
  </div>

  <!-- ── HEADER ─────────────────────────────────────── -->
  <header id="header" class="header">
    <button id="logo-btn" class="logo" aria-label="Home">
      <img class="logo-img" src="Лого/монограма3.png" alt="Olha Kononchuk">
    </button>

    <nav id="main-nav" class="main-nav">
      <button class="nav-item" data-section="works">Works</button>
      <button class="nav-item" data-section="thoughts">Thoughts</button>
      <button class="nav-item" data-section="experiments">Experiments</button>
      <button class="nav-item" data-section="going-on">Going On</button>
      <button class="nav-item" data-section="contacts">Contacts</button>
    </nav>

    <div class="header-end">
      <button id="active-label" class="active-label" aria-label="Back to section"></button>
      <button id="menu-btn" class="menu-btn" aria-label="Toggle menu">
        <span class="btn-dot"></span>
      </button>
    </div>
  </header>

  <!-- ── HERO ───────────────────────────────────────── -->
  <section id="page-hero" class="page page-hero active">
    <div class="hero-bg"></div>
    <footer class="footer footer-hero">
      <div class="footer-icons">
        <a href="#" class="footer-icon" aria-label="Instagram">
          <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>
        </a>
        <a href="#" class="footer-icon" aria-label="Facebook">
          <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
        </a>
        <a href="mailto:artist@example.com" class="footer-icon" aria-label="Email">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,14 22,4"/></svg>
        </a>
      </div>
      <p class="footer-name">Olha Kononchuk</p>
    </footer>
  </section>

  <!-- ── SECTION GRID ───────────────────────────────── -->
  <section id="page-section" class="page page-section">
    <div id="works-grid" class="works-grid"></div>
    <footer class="footer">
      <div class="footer-icons">
        <a href="#" class="footer-icon" aria-label="Instagram">
          <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>
        </a>
        <a href="#" class="footer-icon" aria-label="Facebook">
          <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
        </a>
        <a href="mailto:artist@example.com" class="footer-icon" aria-label="Email">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,14 22,4"/></svg>
        </a>
      </div>
      <p class="footer-name">Olha Kononchuk</p>
    </footer>
  </section>

  <!-- ── WORK DETAIL ────────────────────────────────── -->
  <section id="page-detail" class="page page-detail">
    <div class="detail-wrap">
      <div class="detail-hero-wrap">
        <img id="detail-hero-img" class="detail-hero-img" src="" alt="">
      </div>
      <div class="detail-body">
        <div class="detail-meta">
          <h1 id="det-title" class="det-title"></h1>
          <p id="det-year" class="det-meta-row"></p>
          <p id="det-technique" class="det-meta-row"></p>
        </div>
        <div class="detail-desc-col">
          <p id="det-desc" class="det-desc"></p>
        </div>
      </div>
      <div id="detail-extra" class="detail-extra"></div>
    </div>
    <footer class="footer">
      <div class="footer-icons">
        <a href="#" class="footer-icon" aria-label="Instagram">
          <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>
        </a>
        <a href="#" class="footer-icon" aria-label="Facebook">
          <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
        </a>
        <a href="mailto:artist@example.com" class="footer-icon" aria-label="Email">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,14 22,4"/></svg>
        </a>
      </div>
      <p class="footer-name">Olha Kononchuk</p>
    </footer>
  </section>

  <!-- ── CONTACTS ───────────────────────────────────── -->
  <section id="page-contacts" class="page page-contacts">
    <div class="contacts-wrap">
      <div class="contacts-inner">
        <div class="contact-row">
          <span class="contact-label">Instagram</span>
          <a href="#" class="contact-val">@artistname</a>
        </div>
        <div class="contact-row">
          <span class="contact-label">Facebook</span>
          <a href="#" class="contact-val">Artist Name</a>
        </div>
        <div class="contact-row">
          <span class="contact-label">Email</span>
          <a href="mailto:artist@example.com" class="contact-val">artist@example.com</a>
        </div>
      </div>
    </div>
    <footer class="footer">
      <div class="footer-icons">
        <a href="#" class="footer-icon" aria-label="Instagram">
          <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>
        </a>
        <a href="#" class="footer-icon" aria-label="Facebook">
          <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
        </a>
        <a href="mailto:artist@example.com" class="footer-icon" aria-label="Email">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,14 22,4"/></svg>
        </a>
      </div>
      <p class="footer-name">Olha Kononchuk</p>
    </footer>
  </section>

  <!-- ── LIGHTBOX ───────────────────────────────────── -->
  <div id="lightbox" class="lightbox" hidden>
    <button id="lb-close" class="lb-close" aria-label="Close">&times;</button>
    <div id="lb-content" class="lb-content"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
